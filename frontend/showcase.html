<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Macro DataHub Showcase</title>
  <style>
    :root {
      --ink: #111827;
      --muted: #64748b;
      --line: rgba(17, 24, 39, .12);
      --paper: rgba(255, 255, 255, .82);
      --paper-solid: #ffffff;
      --teal: #0f766e;
      --cyan: #0891b2;
      --coral: #ef4444;
      --amber: #d97706;
      --violet: #7c3aed;
      --green: #16a34a;
      --shadow: 0 24px 70px rgba(15, 23, 42, .16);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(135deg, rgba(8, 145, 178, .16), transparent 34%),
        linear-gradient(42deg, transparent 18%, rgba(217, 119, 6, .12) 44%, transparent 72%),
        #f7f3ea;
      overflow-x: hidden;
    }

    #dataField {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: .72;
      pointer-events: none;
    }

    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
    }

    .rail {
      min-height: 100vh;
      padding: 20px 14px;
      background: rgba(17, 24, 39, .92);
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      position: sticky;
      top: 0;
    }

    .mark {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: #f8fafc;
      color: #111827;
      display: grid;
      place-items: center;
      font-weight: 900;
      letter-spacing: 0;
      box-shadow: 0 16px 40px rgba(0, 0, 0, .25);
    }

    .rail-btn {
      width: 48px;
      height: 48px;
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 14px;
      background: rgba(255, 255, 255, .08);
      color: #e2e8f0;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 800;
    }

    .rail-btn:hover, .rail-btn.active {
      background: #f8fafc;
      color: #111827;
    }

    .content {
      padding: 24px;
      display: grid;
      gap: 18px;
      max-width: 1480px;
      width: 100%;
      margin: 0 auto;
    }

    .topbar {
      min-height: 76px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 18px 20px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .76);
      backdrop-filter: blur(18px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .title h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 46px);
      line-height: 1;
      letter-spacing: 0;
    }

    .title p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid rgba(22, 163, 74, .25);
      border-radius: 999px;
      background: rgba(240, 253, 244, .82);
      color: #166534;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 8px rgba(22, 163, 74, .12);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(360px, .9fr) minmax(0, 1.4fr);
      gap: 18px;
      align-items: stretch;
    }

    .panel {
      border: 1px solid var(--line);
      background: var(--paper);
      backdrop-filter: blur(18px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .panel-head h2, .panel-head h3 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
    }

    .panel-head p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .panel-body { padding: 18px; }

    .control-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field { display: grid; gap: 7px; }

    label {
      font-size: 12px;
      color: #334155;
      font-weight: 900;
    }

    select, input {
      width: 100%;
      height: 44px;
      border: 1px solid rgba(15, 23, 42, .16);
      border-radius: 12px;
      background: rgba(255, 255, 255, .88);
      color: var(--ink);
      padding: 0 12px;
      outline: none;
      font-size: 14px;
    }

    select:focus, input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 4px rgba(8, 145, 178, .14);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .cmd {
      height: 46px;
      border: 0;
      border-radius: 13px;
      font-weight: 900;
      cursor: pointer;
      letter-spacing: 0;
    }

    .cmd.primary {
      color: #ffffff;
      background: #111827;
      box-shadow: 0 16px 38px rgba(17, 24, 39, .22);
    }

    .cmd.secondary {
      color: #0f172a;
      background: rgba(255, 255, 255, .82);
      border: 1px solid var(--line);
    }

    .cmd:hover { transform: translateY(-1px); }

    .search-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 96px;
      gap: 10px;
      margin-top: 14px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
      min-height: 34px;
    }

    .chip {
      border: 1px solid rgba(15, 23, 42, .12);
      border-radius: 999px;
      padding: 7px 10px;
      background: rgba(255, 255, 255, .72);
      color: #334155;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .chip:hover {
      background: #111827;
      color: #fff;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 14px;
    }

    .metric {
      min-height: 92px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, .72);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      font-size: 26px;
      line-height: 1;
    }

    .metric small {
      display: block;
      margin-top: 7px;
      color: #475569;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chart-box {
      height: 372px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background:
        linear-gradient(90deg, rgba(17, 24, 39, .035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(17, 24, 39, .035) 1px, transparent 1px),
        rgba(255, 255, 255, .66);
      background-size: 42px 42px;
      padding: 12px;
    }

    canvas.chart {
      display: block;
      width: 100%;
      height: 100%;
    }

    .lower-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(360px, .95fr);
      gap: 18px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tab {
      height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .72);
      color: #334155;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .tab.active {
      background: #111827;
      color: #fff;
    }

    pre {
      margin: 0;
      height: 364px;
      overflow: auto;
      border-radius: 16px;
      padding: 16px;
      background: #101827;
      color: #dbeafe;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .quality-list {
      display: grid;
      gap: 10px;
    }

    .quality-item {
      min-height: 44px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, .72);
      font-size: 13px;
    }

    .badge {
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 900;
      background: rgba(8, 145, 178, .1);
      color: #155e75;
    }

    .badge.good { background: rgba(22, 163, 74, .12); color: #166534; }
    .badge.warn { background: rgba(217, 119, 6, .14); color: #92400e; }
    .badge.bad { background: rgba(239, 68, 68, .14); color: #991b1b; }

    .compare-list {
      display: grid;
      gap: 10px;
      max-height: 386px;
      overflow: auto;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      min-height: 54px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .72);
    }

    .rank {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: #111827;
      color: #fff;
      font-size: 12px;
      font-weight: 900;
    }

    .country-name strong {
      display: block;
      font-size: 14px;
    }

    .country-name small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .rank-value {
      text-align: right;
      font-weight: 900;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .error {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(239, 68, 68, .26);
      background: rgba(254, 226, 226, .84);
      color: #991b1b;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .link {
      color: #0f766e;
      font-size: 13px;
      font-weight: 900;
      text-decoration: none;
    }

    @media (max-width: 1120px) {
      .shell { grid-template-columns: 1fr; }
      .rail {
        min-height: 72px;
        height: auto;
        position: relative;
        flex-direction: row;
        justify-content: center;
      }
      .hero-grid, .lower-grid { grid-template-columns: 1fr; }
      .metric-row { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 680px) {
      .content { padding: 14px; }
      .topbar { grid-template-columns: 1fr; }
      .control-grid, .button-row, .metric-row, .search-line { grid-template-columns: 1fr; }
      .chart-box { height: 300px; }
      pre { height: 300px; }
      .rank-row { grid-template-columns: 32px minmax(0, 1fr); }
      .rank-value { grid-column: 2; text-align: left; max-width: 100%; }
    }
  </style>
</head>
<body>
<canvas id="dataField"></canvas>

<div class="shell">
  <aside class="rail" aria-label="Showcase navigation">
    <div class="mark" title="Macro DataHub">MD</div>
    <button class="rail-btn active" data-jump="queryPanel" title="查询">Q</button>
    <button class="rail-btn" data-jump="comparePanel" title="对比">C</button>
    <button class="rail-btn" data-jump="jsonPanel" title="JSON">J</button>
    <button class="rail-btn" onclick="location.href='/'" title="返回稳定版">V1</button>
  </aside>

  <main class="content">
    <section class="topbar">
      <div class="title">
        <h1>Macro DataHub 展示版</h1>
        <p>官方宏观数据源、统一指标字典、结构化 JSON、质量校验和国家对比都放在一个更适合答辩展示的界面里。</p>
      </div>
      <div class="status"><span class="pulse"></span><span id="serviceStatus">连接服务中</span></div>
    </section>

    <section class="hero-grid">
      <div class="panel" id="queryPanel">
        <div class="panel-head">
          <div>
            <h2>实时查询控制台</h2>
            <p>按国家、指标、频率、时间范围调用真实后端。</p>
          </div>
        </div>
        <div class="panel-body">
          <div class="control-grid">
            <div class="field">
              <label for="country">国家 / 地区</label>
              <select id="country"></select>
            </div>
            <div class="field">
              <label for="indicator">标准指标</label>
              <select id="indicator"></select>
            </div>
            <div class="field">
              <label for="startDate">开始日期</label>
              <input id="startDate" value="2018">
            </div>
            <div class="field">
              <label for="endDate">结束日期</label>
              <input id="endDate" value="2024">
            </div>
            <div class="field">
              <label for="frequency">频率</label>
              <select id="frequency">
                <option value="A">年度 A</option>
                <option value="M">月度 M</option>
              </select>
            </div>
            <div class="field">
              <label for="searchBox">指标搜索</label>
              <div class="search-line">
                <input id="searchBox" value="gdp" placeholder="gdp / CPI / 失业">
                <button class="cmd secondary" onclick="runSearch()">搜索</button>
              </div>
            </div>
          </div>

          <div class="button-row">
            <button class="cmd primary" onclick="runQuery()">运行查询</button>
            <button class="cmd secondary" onclick="loadDemo()">中国 GDP 示例</button>
          </div>

          <div class="chips" id="searchChips"></div>
          <div class="links">
            <a class="link" href="/docs" target="_blank">API 文档</a>
            <a class="link" href="/schema" target="_blank">Schema</a>
            <a class="link" href="/capabilities" target="_blank">Capabilities</a>
            <a class="link" href="/" target="_blank">稳定版界面</a>
          </div>
          <div id="errorBox" class="error"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div>
            <h2 id="chartTitle">指标趋势图</h2>
            <p id="chartSub">等待查询</p>
          </div>
          <span class="badge" id="sourceBadge">source</span>
        </div>
        <div class="panel-body">
          <div class="metric-row">
            <div class="metric"><span>国家覆盖</span><strong id="mCountries">-</strong><small>当前字典</small></div>
            <div class="metric"><span>标准指标</span><strong id="mIndicators">-</strong><small>可扩展</small></div>
            <div class="metric"><span>观测值</span><strong id="mObs">0</strong><small>本次查询</small></div>
            <div class="metric"><span>质量状态</span><strong id="mQuality">-</strong><small id="mQualitySub">等待校验</small></div>
          </div>
          <div class="chart-box">
            <canvas id="seriesChart" class="chart" width="900" height="360"></canvas>
          </div>
        </div>
      </div>
    </section>

    <section class="lower-grid">
      <div class="panel" id="jsonPanel">
        <div class="panel-head">
          <div>
            <h3>结构化输出</h3>
            <p>同一套响应可以给网页、Agent、研究脚本和看板使用。</p>
          </div>
          <div class="tabs">
            <button class="tab active" data-view="json">JSON</button>
            <button class="tab" data-view="quality">质量</button>
          </div>
        </div>
        <div class="panel-body">
          <pre id="jsonOutput">等待查询...</pre>
          <div id="qualityOutput" class="quality-list" style="display:none"></div>
        </div>
      </div>

      <div class="panel" id="comparePanel">
        <div class="panel-head">
          <div>
            <h3>国家对比</h3>
            <p>默认比较 2023 年主要经济体名义 GDP。</p>
          </div>
          <button class="cmd secondary" style="width:112px" onclick="runCompare()">刷新</button>
        </div>
        <div class="panel-body">
          <div class="chart-box" style="height:230px;margin-bottom:14px">
            <canvas id="compareChart" class="chart" width="640" height="230"></canvas>
          </div>
          <div class="compare-list" id="compareList"></div>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
let countries = [];
let indicators = [];
let lastResult = null;
let currentView = "json";

const fmt = new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 2 });

function $(id) { return document.getElementById(id); }

function showError(message) {
  $("errorBox").style.display = message ? "block" : "none";
  $("errorBox").textContent = message || "";
}

function resizeCanvas(canvas) {
  const rect = canvas.getBoundingClientRect();
  const ratio = window.devicePixelRatio || 1;
  canvas.width = Math.max(1, Math.floor(rect.width * ratio));
  canvas.height = Math.max(1, Math.floor(rect.height * ratio));
  const ctx = canvas.getContext("2d");
  ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
  return { ctx, width: rect.width, height: rect.height };
}

function drawEmpty(canvas, label) {
  const { ctx, width, height } = resizeCanvas(canvas);
  ctx.clearRect(0, 0, width, height);
  ctx.fillStyle = "#64748b";
  ctx.font = "700 14px system-ui";
  ctx.textAlign = "center";
  ctx.fillText(label, width / 2, height / 2);
}

function drawLineChart(canvas, observations, unit) {
  const { ctx, width, height } = resizeCanvas(canvas);
  ctx.clearRect(0, 0, width, height);
  if (!observations || observations.length === 0) {
    drawEmpty(canvas, "暂无可绘制数据");
    return;
  }
  const pad = { left: 56, right: 24, top: 24, bottom: 44 };
  const values = observations.map(o => Number(o.value)).filter(Number.isFinite);
  const min = Math.min(...values);
  const max = Math.max(...values);
  const span = max - min || Math.abs(max) || 1;
  const plotW = width - pad.left - pad.right;
  const plotH = height - pad.top - pad.bottom;

  ctx.strokeStyle = "rgba(15,23,42,.14)";
  ctx.lineWidth = 1;
  ctx.font = "12px system-ui";
  ctx.fillStyle = "#64748b";
  ctx.textAlign = "right";
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + plotH * i / 4;
    const val = max - span * i / 4;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(width - pad.right, y);
    ctx.stroke();
    ctx.fillText(shortNumber(val), pad.left - 8, y + 4);
  }

  const points = observations.map((o, i) => {
    const x = pad.left + (observations.length === 1 ? plotW / 2 : plotW * i / (observations.length - 1));
    const y = pad.top + plotH - ((Number(o.value) - min) / span) * plotH;
    return { x, y, date: o.date, value: Number(o.value) };
  });

  const area = ctx.createLinearGradient(0, pad.top, 0, height - pad.bottom);
  area.addColorStop(0, "rgba(8,145,178,.26)");
  area.addColorStop(1, "rgba(8,145,178,0)");
  ctx.beginPath();
  points.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
  ctx.lineTo(points[points.length - 1].x, height - pad.bottom);
  ctx.lineTo(points[0].x, height - pad.bottom);
  ctx.closePath();
  ctx.fillStyle = area;
  ctx.fill();

  ctx.beginPath();
  points.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
  ctx.strokeStyle = "#0891b2";
  ctx.lineWidth = 3;
  ctx.stroke();

  points.forEach((p, i) => {
    if (i % Math.ceil(points.length / 8) !== 0 && i !== points.length - 1) return;
    ctx.fillStyle = "#111827";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.textAlign = "center";
  ctx.fillStyle = "#475569";
  const first = observations[0].date;
  const last = observations[observations.length - 1].date;
  ctx.fillText(first, pad.left, height - 16);
  ctx.fillText(last, width - pad.right, height - 16);
  ctx.textAlign = "right";
  ctx.fillText(unit || "", width - pad.right, 16);
}

function drawBarChart(canvas, rows) {
  const { ctx, width, height } = resizeCanvas(canvas);
  ctx.clearRect(0, 0, width, height);
  if (!rows || rows.length === 0) {
    drawEmpty(canvas, "暂无对比数据");
    return;
  }
  const pad = { left: 44, right: 18, top: 18, bottom: 38 };
  const plotW = width - pad.left - pad.right;
  const plotH = height - pad.top - pad.bottom;
  const max = Math.max(...rows.map(r => Number(r.value) || 0)) || 1;
  const gap = 9;
  const barW = Math.max(12, (plotW - gap * (rows.length - 1)) / rows.length);
  rows.forEach((row, i) => {
    const h = (Number(row.value) || 0) / max * plotH;
    const x = pad.left + i * (barW + gap);
    const y = pad.top + plotH - h;
    const colors = ["#111827", "#0f766e", "#d97706", "#7c3aed", "#ef4444", "#0891b2", "#16a34a"];
    ctx.fillStyle = colors[i % colors.length];
    roundRect(ctx, x, y, barW, h, 8);
    ctx.fill();
    ctx.fillStyle = "#475569";
    ctx.font = "11px system-ui";
    ctx.textAlign = "center";
    ctx.fillText(row.country_code, x + barW / 2, height - 14);
  });
}

function roundRect(ctx, x, y, w, h, r) {
  const rr = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.arcTo(x + w, y, x + w, y + h, rr);
  ctx.arcTo(x + w, y + h, x, y + h, rr);
  ctx.arcTo(x, y + h, x, y, rr);
  ctx.arcTo(x, y, x + w, y, rr);
  ctx.closePath();
}

function shortNumber(value) {
  if (!Number.isFinite(value)) return "-";
  const abs = Math.abs(value);
  if (abs >= 1e12) return (value / 1e12).toFixed(1) + "T";
  if (abs >= 1e9) return (value / 1e9).toFixed(1) + "B";
  if (abs >= 1e6) return (value / 1e6).toFixed(1) + "M";
  return fmt.format(value);
}

async function api(path) {
  const response = await fetch(path);
  return response.json();
}

async function init() {
  try {
    const [health, c, i] = await Promise.all([
      api("/health"),
      api("/countries"),
      api("/indicators")
    ]);
    countries = c.countries;
    indicators = i.indicators;
    $("serviceStatus").textContent = `${health.status} · ${health.implemented_sources.join(" + ")}`;
    $("mCountries").textContent = countries.length;
    $("mIndicators").textContent = indicators.length;
    $("country").innerHTML = countries.map(x => `<option value="${x.country_code}">${x.country_code} · ${x.name_zh}</option>`).join("");
    $("indicator").innerHTML = indicators.map(x => `<option value="${x.indicator_code}">${x.indicator_code} · ${x.indicator_name_zh}</option>`).join("");
    $("indicator").addEventListener("change", syncFrequency);
    $("indicator").value = "GDP_NOMINAL";
    $("country").value = "CN";
    syncFrequency();
    await runSearch();
    await runQuery();
    await runCompare();
  } catch (err) {
    $("serviceStatus").textContent = "服务未连接";
    showError("初始化失败，请确认 START_HERE.bat 正在运行。");
  }
}

function syncFrequency() {
  const meta = indicators.find(x => x.indicator_code === $("indicator").value);
  if (!meta) return;
  $("frequency").innerHTML = meta.frequency.map(f => `<option value="${f}">${f === "M" ? "月度 M" : "年度 A"}</option>`).join("");
  if (meta.frequency.includes("A")) {
    $("startDate").value = "2018";
    $("endDate").value = "2024";
  } else {
    $("country").value = "US";
    $("startDate").value = "2020-01";
    $("endDate").value = "2025-12";
  }
}

function loadDemo() {
  $("country").value = "CN";
  $("indicator").value = "GDP_NOMINAL";
  syncFrequency();
  $("frequency").value = "A";
  $("startDate").value = "2018";
  $("endDate").value = "2024";
  runQuery();
}

async function runSearch() {
  const q = encodeURIComponent($("searchBox").value || "");
  const data = await api(`/search-indicators?q=${q}`);
  $("searchChips").innerHTML = data.indicators.slice(0, 8).map(item =>
    `<button class="chip" data-code="${item.indicator_code}" title="${item.indicator_name_en}">${item.indicator_code}</button>`
  ).join("");
  document.querySelectorAll(".chip").forEach(chip => {
    chip.addEventListener("click", () => {
      $("indicator").value = chip.dataset.code;
      syncFrequency();
      runQuery();
    });
  });
}

async function runQuery() {
  showError("");
  const params = new URLSearchParams({
    country: $("country").value,
    indicator_code: $("indicator").value,
    start_date: $("startDate").value,
    end_date: $("endDate").value,
    frequency: $("frequency").value
  });
  $("jsonOutput").textContent = "查询中...";
  try {
    const data = await api(`/series?${params.toString()}`);
    lastResult = data;
    $("jsonOutput").textContent = JSON.stringify(data, null, 2);
    renderQuality(data.quality_report);
    if (data.error || !data.series) {
      $("mObs").textContent = "0";
      $("mQuality").textContent = "失败";
      $("mQualitySub").textContent = data.error ? data.error.code : "empty";
      $("sourceBadge").textContent = "error";
      $("chartTitle").textContent = "指标趋势图";
      $("chartSub").textContent = "查询失败";
      drawEmpty($("seriesChart"), "查询失败");
      showError(data.error ? `${data.error.message}\n${data.error.detail || ""}` : "查询没有返回数据");
      return;
    }
    const series = data.series;
    const obs = series.observations || [];
    $("mObs").textContent = obs.length;
    $("mQuality").textContent = data.quality_report && data.quality_report.passed ? "通过" : "关注";
    $("mQualitySub").textContent = `${series.unit} · ${series.frequency}`;
    $("sourceBadge").textContent = series.source.organization;
    $("chartTitle").textContent = `${series.country_name_zh} · ${series.indicator_name_zh}`;
    $("chartSub").textContent = `${series.source.dataset} / ${series.source.source_series_code}`;
    drawLineChart($("seriesChart"), obs, series.unit);
  } catch (err) {
    showError(String(err));
  }
}

function renderQuality(report) {
  const rows = report ? [
    ["观测值数量", report.observation_count, "good"],
    ["缺失期数", report.missing_period_count, report.missing_period_count ? "warn" : "good"],
    ["重复记录", report.duplicate_records, report.duplicate_records ? "bad" : "good"],
    ["异常波动", report.outlier_count, report.outlier_count ? "warn" : "good"],
    ["来源可追溯", report.traceable_source ? "是" : "否", report.traceable_source ? "good" : "bad"],
    ["总体状态", report.passed ? "通过" : "需关注", report.passed ? "good" : "warn"]
  ] : [["暂无质量报告", "-", "warn"]];
  $("qualityOutput").innerHTML = rows.map(row =>
    `<div class="quality-item"><span>${row[0]}</span><span class="badge ${row[2]}">${row[1]}</span></div>`
  ).join("");
}

async function runCompare() {
  const data = await api("/compare?countries=US,CN,DE,JP,GB,IN,FR&indicator_code=GDP_NOMINAL&date=2023&frequency=A");
  const rows = data.rows || [];
  drawBarChart($("compareChart"), rows);
  $("compareList").innerHTML = rows.map((row, idx) => `
    <div class="rank-row">
      <div class="rank">${idx + 1}</div>
      <div class="country-name"><strong>${row.country_name_zh}</strong><small>${row.country_code} · ${row.source.organization}</small></div>
      <div class="rank-value">${shortNumber(Number(row.value))}</div>
    </div>
  `).join("") || `<div class="quality-item"><span>暂无对比结果</span><span class="badge warn">empty</span></div>`;
}

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    currentView = tab.dataset.view;
    document.querySelectorAll(".tab").forEach(x => x.classList.toggle("active", x === tab));
    $("jsonOutput").style.display = currentView === "json" ? "block" : "none";
    $("qualityOutput").style.display = currentView === "quality" ? "grid" : "none";
  });
});

document.querySelectorAll("[data-jump]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("[data-jump]").forEach(x => x.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(btn.dataset.jump).scrollIntoView({ behavior: "smooth", block: "start" });
  });
});

function animateBackground() {
  const canvas = $("dataField");
  const { ctx, width, height } = resizeCanvas(canvas);
  const nodes = Array.from({ length: 34 }, (_, i) => ({
    x: (Math.sin(i * 31.7) * .5 + .5) * width,
    y: (Math.cos(i * 19.3) * .5 + .5) * height,
    vx: Math.sin(i) * .28,
    vy: Math.cos(i * 1.7) * .24,
    c: ["#0f766e", "#0891b2", "#d97706", "#7c3aed", "#ef4444"][i % 5]
  }));
  function frame() {
    ctx.clearRect(0, 0, width, height);
    ctx.lineWidth = 1;
    nodes.forEach((a, i) => {
      a.x += a.vx;
      a.y += a.vy;
      if (a.x < 0 || a.x > width) a.vx *= -1;
      if (a.y < 0 || a.y > height) a.vy *= -1;
      for (let j = i + 1; j < nodes.length; j++) {
        const b = nodes[j];
        const d = Math.hypot(a.x - b.x, a.y - b.y);
        if (d < 190) {
          ctx.strokeStyle = `rgba(17,24,39,${(1 - d / 190) * .11})`;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
      ctx.fillStyle = a.c;
      ctx.globalAlpha = .5;
      ctx.beginPath();
      ctx.arc(a.x, a.y, 2.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    });
    requestAnimationFrame(frame);
  }
  frame();
}

window.addEventListener("resize", () => {
  if (lastResult && lastResult.series) drawLineChart($("seriesChart"), lastResult.series.observations, lastResult.series.unit);
});

animateBackground();
init();
</script>
